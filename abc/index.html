<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby ABC</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F423;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --text-main: #2D3436;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #E0F7FA 0%, #E3F2FD 100%);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #particles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .home-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            width: 48px;
            height: 48px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 4px 0 #cbd5e1;
            border: 2px solid #e2e8f0;
            z-index: 400;
            transition: transform 0.1s;
        }
        .home-btn:active { transform: translateY(4px); box-shadow: none; }

        /* LEVEL SELECT */
        #level-select {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-family: 'Fredoka One', cursive;
            padding: 20px;
        }
        #level-select.hidden { display: none; }

        .level-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        .level-header h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            line-height: 1.2;
        }

        .lang-toggle {
            display: flex;
            gap: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 4px;
        }
        .lang-toggle button {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-toggle button.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .level-options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 90%;
            max-width: 380px;
        }

        .level-btn {
            position: relative;
            padding: 18px 24px;
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-family: 'Fredoka One', cursive;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 60px;
            overflow: hidden;
        }
        .level-btn:active {
            transform: translateY(6px);
            box-shadow: none;
        }
        .level-btn.locked {
            opacity: 0.45;
            cursor: not-allowed;
            color: #999;
        }
        .level-btn.locked:active { transform: none; box-shadow: 0 6px 0 rgba(0,0,0,0.15); }

        .level-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: linear-gradient(90deg, #4ECDC4, #FFE66D);
            border-radius: 0 0 20px 20px;
            transition: width 0.3s;
        }

        /* UNLOCK CHOICE */
        #unlock-choice {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 250;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-family: 'Fredoka One', cursive;
            animation: slideIn 0.5s ease-out;
            padding: 20px;
        }
        #unlock-choice.active { display: flex; }
        #unlock-choice h2 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        #unlock-choice p {
            font-size: clamp(1rem, 4vw, 1.3rem);
            margin-bottom: 35px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
        }
        .unlock-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .unlock-btn {
            padding: 16px 36px;
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-family: 'Fredoka One', cursive;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
        }
        .unlock-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        /* GAME */
        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            padding: 10px 20px 20px;
            gap: 5px;
        }

        #letter-display {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(6rem, 20vw, 10rem);
            color: var(--text-main);
            text-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
            line-height: 1;
        }
        #letter-display:active { transform: scale(0.9); }

        .hint-text {
            font-family: 'Fredoka One', cursive;
            color: var(--secondary);
            font-size: clamp(1rem, 4vw, 1.5rem);
            margin-bottom: 10px;
            text-align: center;
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2vw, 20px);
            width: 100%;
            flex-wrap: wrap;
        }

        .emoji-btn {
            width: clamp(90px, 20vw, 150px);
            height: clamp(110px, 24vw, 180px);
            background: white;
            border: 4px solid #fff;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06), 0 4px 0 #e2e8f0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 8px 4px;
        }
        .emoji-icon {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 4px;
            line-height: 1.1;
        }
        .emoji-text {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(0.7rem, 2.5vw, 1.1rem);
            color: #636e72;
            text-transform: capitalize;
            text-align: center;
            word-break: break-word;
        }
        .emoji-btn:active {
            transform: scale(0.92) translateY(4px);
            box-shadow: 0 0 0 #e2e8f0;
        }

        .celebrate {
            background-color: var(--secondary) !important;
            border-color: var(--secondary) !important;
            transform: scale(1.1) !important;
            box-shadow: 0 0 30px var(--secondary) !important;
        }
        .celebrate .emoji-text { color: white; }

        .emoji-btn.wrong {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(1);
            border-color: transparent !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        .progress-bar-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.06);
            z-index: 80;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B, #4ECDC4, #FFE66D);
            width: 0%;
            transition: width 0.3s;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in { animation: popIn 0.4s ease-out forwards; }

        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-height: 600px) {
            #letter-display { font-size: 5rem; }
            .emoji-btn { width: 80px; height: 100px; border-radius: 18px; }
            .emoji-icon { font-size: 2rem; }
            .emoji-text { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>
    <a href="/" class="home-btn" title="Home">&#x1F3E0;</a>

    <div id="level-select">
        <div class="level-header">
            <div class="lang-toggle" id="lang-toggle">
                <button class="active" data-lang="en" onclick="setLang('en')">EN</button>
                <button data-lang="fr" onclick="setLang('fr')">FR</button>
            </div>
            <h1 id="level-title"></h1>
        </div>
        <div class="level-options" id="level-options"></div>
    </div>

    <div id="unlock-choice">
        <h2 id="choice-title"></h2>
        <p id="choice-message"></p>
        <div class="unlock-buttons">
            <button class="unlock-btn" id="btn-yes" onclick="continueToNextLevel()"></button>
            <button class="unlock-btn" id="btn-stay" onclick="stayOnLevel()"></button>
        </div>
    </div>

    <div class="progress-bar-container"><div class="progress-bar-fill" id="progress-bar"></div></div>

    <div id="game-area">
        <div id="letter-display">A</div>
        <div class="hint-text" id="hint-text"></div>
        <div class="options-container" id="options"></div>
    </div>

            { L:'Z', items:[{e:'\u{1F993}',w:'Zebra'},{e:'\u{1F4A4}',w:'Zzz'}] }
          ],
          fr: [
            { L:'A', items:[{e:'\u2708\uFE0F',w:'Avion',art:"l'"},{e:'\u{1F41D}',w:'Abeille',art:"l'"}] },
            { L:'B', items:[{e:'\u{1F40B}',w:'Baleine',art:'la '},{e:'\u{1F34C}',w:'Banane',art:'la '}] },
            { L:'C', items:[{e:'\u{1F431}',w:'Chat',art:'le '},{e:'\u{1F986}',w:'Canard',art:'le '}] },
            { L:'D', items:[{e:'\u{1F42C}',w:'Dauphin',art:'le '},{e:'\u{1F995}',w:'Dinosaure',art:'le '}] },
            { L:'E', items:[{e:'\u{1F418}',w:'\u00C9l\u00E9phant',art:"l'"},{e:'\u2B50',w:'\u00C9toile',art:"l'"}] },
            { L:'F', items:[{e:'\u{1F338}',w:'Fleur',art:'la '},{e:'\u{1F353}',w:'Fraise',art:'la '}] },
            { L:'G', items:[{e:'\u{1F992}',w:'Girafe',art:'la '},{e:'\u{1F438}',w:'Grenouille',art:'la '}] },
            { L:'H', items:[{e:'\u{1F989}',w:'Hibou',art:'le '},{e:'\u{1F994}',w:'H\u00E9risson',art:'le '}] },
            { L:'I', items:[{e:'\u{1F3DD}\uFE0F',w:'\u00CEle',art:"l'"},{e:'\u{1F9CA}',w:'Igloo',art:"l'"}] },
            { L:'J', items:[{e:'\u{1F9C3}',w:'Jus',art:'le '},{e:'\u{1F9F8}',w:'Jouet',art:'le '}] },
            { L:'K', items:[{e:'\u{1F998}',w:'Kangourou',art:'le '},{e:'\u{1F428}',w:'Koala',art:'le '}] },
            { L:'L', items:[{e:'\u{1F981}',w:'Lion',art:'le '},{e:'\u{1F319}',w:'Lune',art:'la '},{e:'\u{1F430}',w:'Lapin',art:'le '}] },
            { L:'M', items:[{e:'\u{1F3E0}',w:'Maison',art:'la '},{e:'\u{1F411}',w:'Mouton',art:'le '}] },
            { L:'N', items:[{e:'\u{1F443}',w:'Nez',art:'le '},{e:'\u{1FAB9}',w:'Nid',art:'le '}] },
            { L:'O', items:[{e:'\u{1F34A}',w:'Orange',art:"l'"},{e:'\u{1F43B}',w:'Ours',art:"l'"}] },
            { L:'P', items:[{e:'\u{1F98B}',w:'Papillon',art:'le '},{e:'\u{1F34E}',w:'Pomme',art:'la '}] },
            { L:'Q', items:[{e:'\u2753',w:'Question',art:'la '},{e:'4\uFE0F\u20E3',w:'Quatre',art:'le '}] },
            { L:'R', items:[{e:'\u{1F347}',w:'Raisin',art:'le '},{e:'\u{1F916}',w:'Robot',art:'le '}] },
            { L:'S', items:[{e:'\u2600\uFE0F',w:'Soleil',art:'le '},{e:'\u{1F40D}',w:'Serpent',art:'le '}] },
            { L:'T', items:[{e:'\u{1F682}',w:'Train',art:'le '},{e:'\u{1F422}',w:'Tortue',art:'la '}] },
            { L:'U', items:[{e:'1\uFE0F\u20E3',w:'Un',art:''},{e:'\u{1F3ED}',w:'Usine',art:"l'"}] },
            { L:'V', items:[{e:'\u{1F697}',w:'Voiture',art:'la '},{e:'\u{1F404}',w:'Vache',art:'la '}] },
            { L:'W', items:[{e:'\u{1F683}',w:'Wagon',art:'le '}] },
            { L:'X', items:[{e:'\u{1F3B5}',w:'Xylophone',art:'le '}] },
            { L:'Y', items:[{e:'\u{1F95B}',w:'Yaourt',art:'le '},{e:'\u{1FA80}',w:'Yo-yo',art:'le '}] },
            { L:'Z', items:[{e:'\u{1F993}',w:'Z\u00E8bre',art:'le '},{e:'0\uFE0F\u20E3',w:'Z\u00E9ro',art:'le '}] }
          ]
        };

        const UI = {
            en: {
                title:       '\u{1F393} Choose a Level',
                easy:        '\u{1F3AF} Easy',
                level1:      '\u2B50 Level 2',
                level2:      '\u{1F31F} Level 3',
                level3:      '\u{1F451} Level 4',
                choices:     'choices',
                locked:      '\u{1F512} Locked',
                find:        'Find the ',
                isFor:       'is for',
                canYouFind:  'Can you find the ',
                levelUp:     'Level Up! \u{1F389}',
                amazing:     'Amazing! \u{1F3C6}',
                incredible:  'Incredible! \u{1F451}',
                readyFor:    'Ready for',
                yes:         'Yes! \u{1F680}',
                keepPlaying: 'Keep Playing \u{1F3AE}'
            },
            fr: {
                title:       '\u{1F393} Choisis un Niveau',
                easy:        '\u{1F3AF} Facile',
                level1:      '\u2B50 Niveau 2',
                level2:      '\u{1F31F} Niveau 3',
                level3:      '\u{1F451} Niveau 4',
                choices:     'choix',
                locked:      '\u{1F512} Bloqu\u00E9',
                find:        'Trouve ',
                isFor:       'comme',
                canYouFind:  'Peux-tu trouver ',
                levelUp:     'Bravo! \u{1F389}',
                amazing:     'G\u00E9nial! \u{1F3C6}',
                incredible:  'Incroyable! \u{1F451}',
                readyFor:    'Pr\u00EAt pour',
                yes:         'Oui! \u{1F680}',
                keepPlaying: 'Continuer \u{1F3AE}'
            }
        };

        const CHOICES_PER_LEVEL = [3, 4, 5, 6];
        const UNLOCK_THRESHOLD = [10, 20, 30];

        let lang = localStorage.getItem('abc-lang') || 'en';
        let maxUnlocked = parseInt(localStorage.getItem('abc-max-difficulty') || '0');
        let currentLevel = parseInt(localStorage.getItem('abc-current-difficulty') || '0');
        let correctCount = parseInt(localStorage.getItem('abc-correct-answers') || '0');
        let currentItem = null;
        let currentLetterIdx = -1;
        let canClick = false;
        let recentLetters = [];

        const $levelSelect  = document.getElementById('level-select');
        const $levelTitle   = document.getElementById('level-title');
        const $levelOptions = document.getElementById('level-options');
        const $unlockChoice = document.getElementById('unlock-choice');
        const $choiceTitle  = document.getElementById('choice-title');
        const $choiceMsg    = document.getElementById('choice-message');
        const $btnYes       = document.getElementById('btn-yes');
        const $btnStay      = document.getElementById('btn-stay');
        const $letter       = document.getElementById('letter-display');
        const $hint         = document.getElementById('hint-text');
        const $options      = document.getElementById('options');
        const $progressBar  = document.getElementById('progress-bar');

        function letters() { return DATA[lang]; }
        function t() { return UI[lang]; }
        function art(item) { return item.art || ''; }

        function say(text, speechLang) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const code = speechLang === 'fr' ? 'fr' : 'en';
            u.lang = code === 'fr' ? 'fr-FR' : 'en-US';
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v => v.lang.startsWith(code)) || voices[0];
            if (preferred) u.voice = preferred;
            u.rate = 0.9;
            u.pitch = 1.1;
            window.speechSynthesis.speak(u);
        }

        function save() {
            localStorage.setItem('abc-lang', lang);
            localStorage.setItem('abc-max-difficulty', maxUnlocked);
            localStorage.setItem('abc-current-difficulty', currentLevel);
            localStorage.setItem('abc-correct-answers', correctCount);
        }

        function setLang(l) {
            lang = l;
            save();
            document.querySelectorAll('#lang-toggle button').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === l);
            });
            renderLevelSelect();
        }

        function showLevelSelect() {
            $levelSelect.classList.remove('hidden');
            document.querySelectorAll('#lang-toggle button').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === lang);
            });
            renderLevelSelect();
        }

        function renderLevelSelect() {
            const tr = t();
            $levelTitle.innerText = tr.title;
            $levelOptions.innerHTML = '';
            const names = [tr.easy, tr.level1, tr.level2, tr.level3];

            for (let i = 0; i < 4; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                const numChoices = CHOICES_PER_LEVEL[i];

                if (i > maxUnlocked) {
                    btn.classList.add('locked');
                    btn.disabled = true;
                    btn.innerHTML = names[i] + ' \u2014 ' + tr.locked;
                } else {
                    btn.innerHTML = names[i] + ' <span style="opacity:0.6;font-size:0.75em">(' + numChoices + ' ' + tr.choices + ')</span>';
                    if (i === currentLevel && correctCount > 0 && i < 3) {
                        const pct = Math.min((correctCount / UNLOCK_THRESHOLD[i]) * 100, 100);
                        const bar = document.createElement('div');
                        bar.className = 'level-progress';
                        bar.style.width = pct + '%';
                        btn.appendChild(bar);
                    }
                    btn.addEventListener('click', () => startLevel(i));
                }
                $levelOptions.appendChild(btn);
            }
        }

        function startLevel(lvl) {
            if (lvl !== currentLevel) { correctCount = 0; }
            currentLevel = lvl;
            save();
            $levelSelect.classList.add('hidden');
            updateProgressBar();
            nextRound();
        }

        function updateProgressBar() {
            if (currentLevel < 3) {
                const pct = (correctCount / UNLOCK_THRESHOLD[currentLevel]) * 100;
                $progressBar.style.width = Math.min(pct, 100) + '%';
            } else {
                $progressBar.style.width = '100%';
            }
        }

        function showUnlockChoice() {
            const tr = t();
            const titles = [tr.levelUp, tr.amazing, tr.incredible];
            const nextChoices = CHOICES_PER_LEVEL[currentLevel + 1];
            $choiceTitle.innerText = titles[currentLevel] || tr.levelUp;
            $choiceMsg.innerText = tr.readyFor + ' ' + nextChoices + ' ' + tr.choices + '?';
            $btnYes.innerText = tr.yes;
            $btnStay.innerText = tr.keepPlaying;
            $unlockChoice.classList.add('active');
            say(titles[currentLevel] || 'Level Up', lang);
        }

        function continueToNextLevel() {
            $unlockChoice.classList.remove('active');
            maxUnlocked = Math.max(maxUnlocked, currentLevel + 1);
            currentLevel++;
            correctCount = 0;
            save();
            updateProgressBar();
            nextRound();
        }

        function stayOnLevel() {
            $unlockChoice.classList.remove('active');
            correctCount = 0;
            save();
            updateProgressBar();
            nextRound();
        }

        function pickLetterIdx() {
            const data = letters();
            const weights = data.map((_, i) => recentLetters.includes(i) ? 0.05 : 1);
            const total = weights.reduce((a, b) => a + b, 0);
            let r = Math.random() * total;
            for (let i = 0; i < weights.length; i++) {
                r -= weights[i];
                if (r <= 0) return i;
            }
            return weights.length - 1;
        }

        function nextRound() {
            canClick = true;
            const tr = t();
            const data = letters();

            const li = pickLetterIdx();
            currentLetterIdx = li;
            recentLetters.push(li);
            if (recentLetters.length > 8) recentLetters.shift();

            const letterObj = data[li];
            currentItem = letterObj.items[Math.floor(Math.random() * letterObj.items.length)];

            $letter.innerText = letterObj.L;
            $letter.style.color = randomColor();
            $letter.classList.remove('pop-in');
            void $letter.offsetWidth;
            $letter.classList.add('pop-in');

            const word = currentItem.w;
            const a = art(currentItem);
            $hint.innerText = tr.find + a + word + '...';

            setTimeout(() => {
                say(letterObj.L + ' ' + tr.isFor + ' ' + word + '. ' + tr.canYouFind + a + word + '?', lang);
            }, 300);

            const numChoices = CHOICES_PER_LEVEL[currentLevel];
            const usedIdxs = new Set([li]);
            const choices = [currentItem];

            while (choices.length < numChoices) {
                let ri;
                do { ri = Math.floor(Math.random() * data.length); } while (usedIdxs.has(ri));
                usedIdxs.add(ri);
                const otherItems = data[ri].items;
                choices.push(otherItems[Math.floor(Math.random() * otherItems.length)]);
            }

            for (let i = choices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [choices[i], choices[j]] = [choices[j], choices[i]];
            }

            $options.innerHTML = '';
            choices.forEach((item, i) => {
                const btn = document.createElement('div');
                btn.className = 'emoji-btn pop-in';
                btn.style.animationDelay = i * 0.08 + 's';

                const icon = document.createElement('div');
                icon.className = 'emoji-icon';
                icon.innerText = item.e;

                const text = document.createElement('div');
                text.className = 'emoji-text';
                text.innerText = item.w;

                btn.appendChild(icon);
                btn.appendChild(text);

                btn.addEventListener('click', (ev) => {
                    ev.preventDefault();
                    if (!canClick || btn.classList.contains('wrong')) return;
                    say(item.w, lang);

                    if (item === currentItem) {
                        if (!canClick) return;
                        canClick = false;
                        correctCount++;
                        save();
                        btn.classList.add('celebrate');
                        updateProgressBar();

                        const rect = btn.getBoundingClientRect();
                        for (let k = 0; k < 3; k++) {
                            setTimeout(() => createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, randomColor()), k * 200);
                        }

                        if (currentLevel < 3 && correctCount >= UNLOCK_THRESHOLD[currentLevel]) {
                            setTimeout(() => showUnlockChoice(), 2500);
                        } else {
                            setTimeout(nextRound, 2500);
                        }
                    } else {
                        btn.classList.add('wrong');
                    }
                });
                $options.appendChild(btn);
            });
        }

        $letter.addEventListener('click', () => {
            if (currentItem) {
                say(letters()[currentLetterIdx].L, lang);
                $letter.style.transform = 'scale(1.2)';
                setTimeout(() => $letter.style.transform = 'scale(1)', 200);
            }
        });

        function randomColor() {
            const c = ['#FF6B6B','#4ECDC4','#FFE66D','#FF9F43','#A29BFE','#fd79a8','#00cec9'];
            return c[Math.floor(Math.random() * c.length)];
        }

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function setupCanvas() {
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize);
            resize();
            animateParticles();
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                this.size = Math.random() * 8 + 4;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.life = 100;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2;
                this.life -= 2;
                this.size *= 0.95;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(this.size, 0), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 25; i++) particles.push(new Particle(x, y, color));
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateParticles);
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {};
        }
        setupCanvas();
        showLevelSelect();
    </script>

</body>
</html>
